// Based on gRPC health check protocol - more details found here:
// https://github.com/grpc/grpc/blob/master/doc/health-checking.md

syntax = "proto3";
option go_package = "nvidia.com/riva_speech";

package grpc.health.v1;

option cc_enable_arenas = true;

// Health
service Health {
  // Health check
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);
  // Watch is a method that performs a continuous health check. The server
  // will immediately respond with the current serving status, and then respond whenever the service's serving status changes. The server will end the response stream if the client cancels the request.
  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
}
